repos:

# Linter
- repo: local
  hooks:
    - id: ruff
      name: lint with ruff
      language: system
      entry: ruff check --force-exclude --fix
      types: [python]
      require_serial: true

    - id: ruff-format
      name: format with ruff
      language: system
      entry: ruff format --force-exclude
      types: [python]
      require_serial: true


# Other syntax checks
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.3.0
  hooks:
  - id: check-ast
  - id: check-yaml
  - id: check-merge-conflict
  - id: check-added-large-files
    args: ['--maxkb=200']
